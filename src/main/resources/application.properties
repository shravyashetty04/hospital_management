# ============================================================
# Application
# ============================================================
spring.application.name=hospital-appointment-management
server.port=8080
server.servlet.context-path=/api/v1

# ============================================================
# PostgreSQL — Aiven Cloud
# Host : pg-1a78d5fa-shravya1ga22is144-3598.g.aivencloud.com
# Port : 16302
# DB   : defaultdb
# SSL  : required (Aiven enforces TLS)
# ============================================================
# Set these environment variables before running:
#   DB_URL      = jdbc:postgresql://<host>:<port>/defaultdb?sslmode=require
#   DB_USERNAME = avnadmin
#   DB_PASSWORD = <your-aiven-password>
spring.datasource.url=${DB_URL:jdbc:postgresql://pg-1a78d5fa-shravya1ga22is144-3598.g.aivencloud.com:16302/defaultdb?sslmode=require}
spring.datasource.username=${DB_USERNAME:avnadmin}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP Connection Pool ─────────────────────────────────
# Keep pool small — Aiven free tier limits concurrent connections
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── SSL properties passed directly to the JDBC driver ────────
spring.datasource.hikari.data-source-properties.sslmode=require
spring.datasource.hikari.data-source-properties.ssl=true

# ============================================================
# JPA / Hibernate
# ============================================================
# 'update' auto-creates / alters tables on startup.
# Switch to 'validate' or 'none' after initial schema is stable.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# PostgreSQL dialect (Hibernate 6 auto-detects, but explicit is safer)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Prevent "No TransactionSynchronizationManager" warnings on lazy loads
spring.jpa.open-in-view=false

# ============================================================
# JWT Configuration
# WARNING: Rotate this secret via env variable before any
#          non-local deployment.
# Generate a strong secret: openssl rand -hex 32
# ============================================================
app.jwt.secret=${JWT_SECRET:H0sp1t4lMgmtS3cr3tK3y_JWT_HS256_MinLen32Chars!2024#Secure}
# Access token TTL : 24 hours
app.jwt.expiration-ms=86400000
# Refresh token TTL: 7 days
app.jwt.refresh-expiration-ms=604800000

# ============================================================
# Logging
# ============================================================
logging.level.com.hospital=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.zaxxer.hikari=INFO

# ============================================================
# SpringDoc / Swagger UI
# Access: http://localhost:8080/api/v1/swagger-ui.html
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
